<!DOCTYPE html>
<html><head>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-primary); background: #f5f5f7; padding: 20px; }
.cards { display: flex; gap: 14px; flex-wrap: wrap; }
.card { background: #fff; border: 1px solid #e5e5e8; border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow: hidden; flex: 1; min-width: 160px; max-width: 220px; }
.card-img { height: 80px; display: flex; align-items: center; justify-content: center; }
.card-body { padding: 14px 16px; }
.card-category { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #f28900; margin-bottom: 6px; font-family: var(--font-condensed); }
.card-title { font-size: 14px; font-weight: 700; color: #111; margin-bottom: 6px; }
.card-desc { font-size: 12px; color: #666; line-height: 1.5; margin-bottom: 12px; }
.card-link { font-size: 12px; font-weight: 700; color: #f28900; text-transform: uppercase; letter-spacing: 0.05em; text-decoration: none; display: flex; align-items: center; gap: 4px; }
.card-featured { border-top: 3px solid #f28900; }
</style>
</head><body>
<div class="cards">
  <div class="card card-featured">
    <div class="card-img" style="background:#fff8ee">
      <svg width="48" height="48" viewBox="0 0 80 80" fill="none" stroke="#f28900" stroke-width="3">
        <rect x="20" y="12" width="40" height="56" rx="4"/>
        <ellipse cx="40" cy="18" rx="20" ry="5"/>
        <line x1="20" y1="36" x2="60" y2="36"/>
        <line x1="20" y1="46" x2="60" y2="46"/>
      </svg>
    </div>
    <div class="card-body">
      <div class="card-category">Стальная тара</div>
      <div class="card-title">Стальные бочки</div>
      <div class="card-desc">200 л, UN-сертификат, для нефтяной и химической отрасли</div>
      <div class="card-link">Подробнее →</div>
    </div>
  </div>
  <div class="card">
    <div class="card-img" style="background:#f0f8ff">
      <svg width="48" height="48" viewBox="0 0 80 80" fill="none" stroke="#0070cd" stroke-width="3">
        <rect x="18" y="16" width="44" height="50" rx="8"/>
        <rect x="26" y="10" width="28" height="10" rx="3"/>
      </svg>
    </div>
    <div class="card-body">
      <div class="card-category" style="color:#0070cd">Пластик</div>
      <div class="card-title">Пластиковые барабаны</div>
      <div class="card-desc">60–220 л, пищевые и технические марки</div>
      <div class="card-link" style="color:#0070cd">Подробнее →</div>
    </div>
  </div>
  <div class="card">
    <div class="card-img" style="background:#f5f0ff">
      <svg width="48" height="48" viewBox="0 0 80 80" fill="none" stroke="#7e55c3" stroke-width="3">
        <rect x="10" y="20" width="60" height="44" rx="4"/>
        <rect x="22" y="12" width="36" height="12" rx="3"/>
        <rect x="18" y="58" width="44" height="8" rx="2"/>
      </svg>
    </div>
    <div class="card-body">
      <div class="card-category" style="color:#7e55c3">IBC</div>
      <div class="card-title">Кубовые ёмкости</div>
      <div class="card-desc">600–1250 л, нержавеющая сталь и HDPE</div>
      <div class="card-link" style="color:#7e55c3">Подробнее →</div>
    </div>
  </div>
</div>
</body></html>
