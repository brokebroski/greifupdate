<!DOCTYPE html>
<html><head>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-primary); background: #fff; padding: 24px; }
.section { margin-bottom: 24px; }
.section-label { font-size: 10px; font-weight: 700; color: #aaa; letter-spacing: 0.1em; text-transform: uppercase; font-family: var(--font-condensed); margin-bottom: 10px; }
.tagline-en { font-size: 22px; font-weight: 900; letter-spacing: 0.12em; text-transform: uppercase; color: #f28900; }
.tagline-ru { font-size: 16px; font-weight: 700; color: #333; letter-spacing: 0.06em; margin-top: 4px; }
.voice-items { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.voice-item { display: flex; align-items: flex-start; gap: 8px; padding: 10px 12px; border: 1px solid #f0f0f0; border-radius: 4px; }
.vi-icon { width: 6px; height: 6px; border-radius: 50%; background: #f28900; margin-top: 5px; flex-shrink: 0; }
.vi-text { font-size: 12px; color: #444; line-height: 1.4; }
.vi-text strong { color: #111; display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1px; }
</style>
</head><body>
<div class="section">
  <div class="section-label">Brand Tagline</div>
  <div class="tagline-en">Packaging Success Together</div>
  <div class="tagline-ru">Упаковка для вашего успеха</div>
</div>
<div class="section">
  <div class="section-label">Brand Voice</div>
  <div class="voice-items">
    <div class="voice-item"><div class="vi-icon"></div><div class="vi-text"><strong>Авторитет</strong>Производитель №1 в мире</div></div>
    <div class="voice-item"><div class="vi-icon"></div><div class="vi-text"><strong>Партнёрство</strong>«Вместе», «наши клиенты»</div></div>
    <div class="voice-item"><div class="vi-icon"></div><div class="vi-text"><strong>Безопасность</strong>UN-стандарты, надёжность</div></div>
    <div class="voice-item"><div class="vi-icon"></div><div class="vi-text"><strong>Прямота</strong>B2B-язык без украшений</div></div>
  </div>
</div>
</body></html>
