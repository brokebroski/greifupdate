<!DOCTYPE html>
<html><head>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-primary); background: #fff; padding: 20px; }
.row { display: flex; gap: 8px; flex-wrap: wrap; }
.swatch { flex: 1; min-width: 70px; border-radius: 4px; overflow: hidden; }
.color-block { height: 56px; }
.meta { padding: 6px 8px; background: #fff; border: 1px solid #eee; border-top: none; }
.hex { font-family: var(--font-condensed); font-size: 10px; color: #666; font-weight: 700; }
.name { font-size: 11px; font-weight: 700; color: #222; margin-bottom: 1px; }
.pantone { font-size: 9px; color: #999; }
</style>
</head><body>
<div class="row">
  <div class="swatch">
    <div class="color-block" style="background:#3e8ede"></div>
    <div class="meta"><div class="name">Blue Light</div><div class="hex">#3e8ede</div><div class="pantone">279 C</div></div>
  </div>
  <div class="swatch">
    <div class="color-block" style="background:#0070cd"></div>
    <div class="meta"><div class="name">Blue</div><div class="hex">#0070cd</div><div class="pantone">285 C</div></div>
  </div>
  <div class="swatch">
    <div class="color-block" style="background:#008fbe"></div>
    <div class="meta"><div class="name">Teal</div><div class="hex">#008fbe</div><div class="pantone">313 C</div></div>
  </div>
  <div class="swatch">
    <div class="color-block" style="background:#00adc8"></div>
    <div class="meta"><div class="name">Cyan</div><div class="hex">#00adc8</div><div class="pantone">3125 C</div></div>
  </div>
  <div class="swatch">
    <div class="color-block" style="background:#7e55c3"></div>
    <div class="meta"><div class="name">Purple L</div><div class="hex">#7e55c3</div><div class="pantone">2665 C</div></div>
  </div>
  <div class="swatch">
    <div class="color-block" style="background:#62269e"></div>
    <div class="meta"><div class="name">Purple</div><div class="hex">#62269e</div><div class="pantone">267 C</div></div>
  </div>
  <div class="swatch">
    <div class="color-block" style="background:#337761"></div>
    <div class="meta"><div class="name">Green</div><div class="hex">#337761</div><div class="pantone">341 U</div></div>
  </div>
  <div class="swatch">
    <div class="color-block" style="background:#545458"></div>
    <div class="meta"><div class="name">Gray</div><div class="hex">#545458</div><div class="pantone">CG 11C</div></div>
  </div>
</div>
</body></html>
