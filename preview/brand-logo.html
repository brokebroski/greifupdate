<!DOCTYPE html>
<html><head>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-primary); background: #111; padding: 32px; display: flex; flex-direction: column; gap: 32px; }
.variant { display: flex; align-items: center; gap: 24px; }
.label { font-size: 10px; font-weight: 700; color: #555; letter-spacing: 0.08em; text-transform: uppercase; width: 80px; font-family: 'Roboto Condensed', sans-serif; }
.logo-text { font-family: 'Roboto', sans-serif; font-weight: 900; font-size: 42px; letter-spacing: -2px; line-height: 1; }
.on-light { background: #fff; padding: 20px 28px; border-radius: 4px; }
.on-dark { background: #111; padding: 20px 28px; border-radius: 4px; }
.on-orange { background: #f28900; padding: 20px 28px; border-radius: 4px; }
.tagline { font-size: 11px; font-weight: 500; letter-spacing: 0.25em; text-transform: uppercase; margin-top: 6px; }
</style>
</head><body>
<div class="variant">
  <div class="label">Primary</div>
  <div class="on-light">
    <div class="logo-text" style="color:#f28900">greif</div>
    <div class="tagline" style="color:#545458">Packaging Success Together</div>
  </div>
</div>
<div class="variant">
  <div class="label">On Dark</div>
  <div class="on-dark" style="border:1px solid #333">
    <div class="logo-text" style="color:#f28900">greif</div>
    <div class="tagline" style="color:#888">Packaging Success Together</div>
  </div>
</div>
<div class="variant">
  <div class="label">Reversed</div>
  <div class="on-orange">
    <div class="logo-text" style="color:#fff">greif</div>
    <div class="tagline" style="color:rgba(255,255,255,0.75)">Packaging Success Together</div>
  </div>
</div>
</body></html>
