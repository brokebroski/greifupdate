<!DOCTYPE html>
<html><head>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-primary); background: #fff; padding: 20px; }
.cats { display: flex; gap: 8px; }
.cat { flex: 1; border-radius: 4px; overflow: hidden; }
.cat-color { height: 48px; display: flex; align-items: center; justify-content: center; }
.cat-body { padding: 8px 10px; border: 1px solid #eee; border-top: none; }
.cat-name { font-size: 11px; font-weight: 700; color: #222; }
.cat-sub { font-size: 10px; color: #888; margin-top: 1px; }
svg { opacity: 0.9; }
</style>
</head><body>
<div class="cats">
  <div class="cat">
    <div class="cat-color" style="background:#f28900">
      <svg width="28" height="28" viewBox="0 0 80 80" fill="none" stroke="#fff" stroke-width="4"><rect x="20" y="12" width="40" height="56" rx="4"/><ellipse cx="40" cy="18" rx="20" ry="5"/><line x1="20" y1="36" x2="60" y2="36"/></svg>
    </div>
    <div class="cat-body"><div class="cat-name">Стальные бочки</div><div class="cat-sub">#f28900</div></div>
  </div>
  <div class="cat">
    <div class="cat-color" style="background:#0070cd">
      <svg width="28" height="28" viewBox="0 0 80 80" fill="none" stroke="#fff" stroke-width="4"><rect x="18" y="16" width="44" height="50" rx="8"/><rect x="26" y="10" width="28" height="10" rx="3"/></svg>
    </div>
    <div class="cat-body"><div class="cat-name">Пластиковые барабаны</div><div class="cat-sub">#0070cd</div></div>
  </div>
  <div class="cat">
    <div class="cat-color" style="background:#7e55c3">
      <svg width="28" height="28" viewBox="0 0 80 80" fill="none" stroke="#fff" stroke-width="4"><rect x="10" y="20" width="60" height="44" rx="4"/><rect x="22" y="12" width="36" height="12" rx="3"/></svg>
    </div>
    <div class="cat-body"><div class="cat-name">Кубовые ёмкости (IBC)</div><div class="cat-sub">#7e55c3</div></div>
  </div>
  <div class="cat">
    <div class="cat-color" style="background:#008fbe">
      <svg width="28" height="28" viewBox="0 0 80 80" fill="none" stroke="#fff" stroke-width="4"><rect x="22" y="10" width="36" height="60" rx="6"/><rect x="30" y="6" width="20" height="8" rx="3"/></svg>
    </div>
    <div class="cat-body"><div class="cat-name">Канистры</div><div class="cat-sub">#008fbe</div></div>
  </div>
  <div class="cat">
    <div class="cat-color" style="background:#337761">
      <svg width="28" height="28" viewBox="0 0 80 80" fill="none" stroke="#fff" stroke-width="4"><path d="M40 20 L60 60 L20 60 Z"/><circle cx="40" cy="40" r="8"/></svg>
    </div>
    <div class="cat-body"><div class="cat-name">Восстановление</div><div class="cat-sub">#337761</div></div>
  </div>
</div>
</body></html>
