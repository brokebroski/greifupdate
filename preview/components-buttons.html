<!DOCTYPE html>
<html><head>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-primary); background: #fff; padding: 24px; }
.row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
.row-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #aaa; width: 70px; flex-shrink: 0; font-family: var(--font-condensed); }
button { font-family: var(--font-primary); font-weight: 700; font-size: 13px; cursor: pointer; border: none; letter-spacing: 0.03em; transition: all 0.15s; }
.btn-primary { background: #f28900; color: #fff; padding: 10px 22px; border-radius: 4px; text-transform: uppercase; }
.btn-primary:hover { background: #d97700; }
.btn-secondary { background: #000; color: #fff; padding: 10px 22px; border-radius: 4px; text-transform: uppercase; }
.btn-outline { background: transparent; color: #f28900; border: 2px solid #f28900; padding: 8px 20px; border-radius: 4px; text-transform: uppercase; }
.btn-ghost { background: transparent; color: #545458; border: 2px solid #e5e5e8; padding: 8px 20px; border-radius: 4px; }
.btn-sm { font-size: 11px; padding: 6px 14px; }
.btn-lg { font-size: 15px; padding: 14px 28px; }
.btn-disabled { background: #e5e5e8; color: #aaa; padding: 10px 22px; border-radius: 4px; cursor: not-allowed; text-transform: uppercase; }
.btn-icon { display: flex; align-items: center; gap: 6px; background: #f28900; color: #fff; padding: 10px 18px; border-radius: 4px; text-transform: uppercase; font-size: 13px; font-weight: 700; }
</style>
</head><body>
<div class="row">
  <div class="row-label">Primary</div>
  <button class="btn-primary">Запросить цену</button>
  <button class="btn-primary btn-sm">Запросить цену</button>
  <button class="btn-primary btn-lg">Запросить цену</button>
</div>
<div class="row">
  <div class="row-label">Secondary</div>
  <button class="btn-secondary">Узнать больше</button>
  <button class="btn-outline">Каталог</button>
  <button class="btn-ghost">Контакты</button>
</div>
<div class="row">
  <div class="row-label">States</div>
  <button class="btn-disabled" disabled>Недоступно</button>
  <div class="btn-icon">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
    Скачать PDF
  </div>
</div>
</body></html>
